name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: pip install ruff

      - name: Python syntax check
        run: python3 -m compileall -q dashboard.py monitor.py boy.py

      - name: Ruff lint
        run: ruff check dashboard.py monitor.py boy.py --select E9,F63,F7,F82 --output-format github

      - name: Shell syntax check
        run: bash -n install.sh && echo "install.sh OK"

      - name: Shellcheck
        run: |
          sudo apt-get install -y shellcheck -q
          shellcheck install.sh
